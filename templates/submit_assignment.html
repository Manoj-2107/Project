<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Assignment</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,600" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="left" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; background:#2C3034; padding:20px;">
  <h2 style="color:#03A9F4;">Submit Assignment for {{ course_title }}</h2>

  <form method="post" style="width:80%; margin-top:20px;">
    <div style="margin-bottom:15px;">
      <label style="color:#e3e3e3;">Assignment Title:</label><br>
      <input type="text" name="title" required style="width:100%; padding:10px;">
    </div>

    <div style="margin-bottom:15px;">
      <label style="color:#e3e3e3;">Assignment Answer:</label><br>
      <textarea name="answer" rows="6" required style="width:100%; padding:10px;"></textarea>
    </div>

    <button type="submit" class="signup">Submit Assignment</button>
    <button type="button" class="off signup" onclick="location.href='/learner_dashboard'">Cancel</button>
  </form>
</div>

</body>
</html>
