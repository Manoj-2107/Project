<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Learners</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,600" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="left" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; background:#2C3034; color:#e3e3e3; padding:20px;">
    <h2 style="color:#03A9F4;">All Learners</h2>
    <div style="margin-top:20px; width:80%;">
      {% if learners %}
        <ul style="list-style:none; padding:0;">
          {% for username, info in learners.items() %}
            <li style="background:#f9f9f9; color:#212121; margin:10px 0; padding:10px 20px; border-radius:6px;">
              <strong>Username:</strong> {{ username }} <br>
              <strong>Email:</strong> {{ info.email }}
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p>No learners found.</p>
      {% endif %}
    </div>
    <div style="margin-top:30px;">
      <button class="signup" onclick="location.href='/mentor_dashboard'">Back to Dashboard</button>
    </div>
  </div>
</body>
</html>
