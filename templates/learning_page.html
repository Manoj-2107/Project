<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Dashboard</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,600" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .learning-container {
      display: flex;
      height: 70%;
      width: 100%;
      background: #2C3034;
      color: #e3e3e3;
    }
    .section {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .section h2 {
      color: #03A9F4;
      margin-bottom: 20px;
      text-align: center;
    }
    .chatbox {
      background: #333;
      padding: 20px;
      border-radius: 8px;
    }
    .chatbox textarea {
      width: 100%;
      height: 100px;
      background: transparent;
      border: 1px solid #03A9F4;
      color: #e3e3e3;
      padding: 10px;
      resize: none;
      font-family: 'Roboto', sans-serif;
    }
    .chatbox button {
      margin-top: 10px;
    }
    .progressbar {
      background: #444;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .progressbar-fill {
      width: 100%; /* Static for now */
      height: 20px;
      background: #03A9F4;
      margin-top: 10px;
      border-radius: 10px;
    }
    .assignments {
      background: #444;
      padding: 20px;
      border-radius: 8px;
    }
    .assignments ul {
      list-style-type: none;
      padding: 0;
    }
    .assignments li {
      margin: 10px 0;
    }
    .assignments a {
      color: #03A9F4;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="learning-container">
  
  <!-- AI Chatbot Section -->
  <div class="section">
    <h2>Ask AI Tutor 💬</h2>
    <div class="chatbox">
      <form action="/chatbot" method="post">
        <textarea name="question" placeholder="Ask me anything about DevOps, Docker, Kubernetes..."></textarea>
        <button type="submit" class="signup">Ask</button>
      </form>
    </div>
  </div>

  <!-- Course Progress Section -->
  <!-- Course Progress -->
  <div class="section">
    <h2>Course Progress 📚</h2>
    <div style="margin-top:1em; background:#03A9F4; padding:10px 20px; border-radius:8px; display:inline-block;">
      <p style="color:white; font-weight:bold; margin:0;">🧩 Course Progress: {{ progress_percentage }}% Complete 🎯</p>
    </div>
</div>
  <!-- Assignments Section -->
  <div class="section">
    <h2>Your Assignments 📋</h2>
    <div class="assignments">
      <ul>
        <li><a href="#">Assignment 1: Linux Basics</a></li>
        <li><a href="#">Assignment 2: Docker Introduction</a></li>
        <li><a href="#">Assignment 3: Kubernetes Setup</a></li>
      </ul>
    </div>
  </div>
</div>

<div style="width: 100%; text-align: center; margin-top: 40px;">
  <!-- Buttons code here -->
  <div style="width: 100%; text-align: center; margin-top: 40px;">
    <a href="{{ url_for('learner_dashboard') }}">
      <button class="signup" style="background: #673AB7; width: 200px; margin: 10px;">⬅ Back to Dashboard</button>
    </a>
    <a href="{{ url_for('logout') }}">
      <button class="signup" style="background: #D32F2F; width: 200px; margin: 10px;">🚪 Logout</button>
    </a>
  </div>
  
</div>
</body>
</html>
